<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #030803;
            font-family: 'Arial', 'Helvetica', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .email-container {
            max-width: 520px;
            width: 100%;
            background-color: #0a120a;
            border-radius: 20px;
            padding: 40px 32px;
            border: 1px solid #1a2a1a;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.8);
        }
        
        h1 {
            color: #e0ffe0;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: -0.2px;
            word-break: break-word;
            text-transform: uppercase;
            font-weight: 500;
            border-bottom: 2px solid #1e3b1e;
            padding-bottom: 20px;
        }
        
        .accent-line {
            width: 60px;
            height: 2px;
            background-color: #2bff8c;
            margin: -10px auto 25px auto;
            border: none;
            opacity: 0.7;
        }
        
        .description {
            color: #b0c0b0;
            font-size: 16px;
            text-align: center;
            margin-bottom: 32px;
            padding: 0 8px;
            line-height: 1.6;
        }
        
        .button-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .button {
            display: inline-block;
            background-color: #1a2a1a;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 14px 36px;
            border-radius: 40px;
            border: 1px solid #2bff8c;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        
        .button:hover {
            background-color: #1f351f;
            border-color: #5cffad;
        }
        
        .divider-line {
            width: 100%;
            height: 1px;
            background-color: #1f331f;
            margin: 25px 0 20px 0;
        }
        
        .fallback-link {
            text-align: center;
            font-size: 13px;
            color: #4a6b4a;
        }
        
        .fallback-link a {
            color: #6da86d;
            text-decoration: none;
            border-bottom: 1px dashed #2b5a2b;
            word-break: break-all;
        }
        
        .fallback-link a:hover {
            color: #8bff8b;
            border-bottom-color: #2bff8c;
        }
        
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #2f402f;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #1a261a;
        }
        
        /* Вторая акцентная линия сверху */
        .top-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #2bff8c, transparent);
            margin-bottom: 25px;
            opacity: 0.5;
        }
        
        @media (max-width: 480px) {
            .email-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .button {
                display: block;
                padding: 14px 20px;
            }
            
            .fallback-link a {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        
        <div class="top-line"></div>
        <h1>{{TITLE}}</h1>
        
        
        <div class="accent-line"></div>
        
        <div class="description">{{DESCRIPTION}}</div>
        

        <div class="button-container">
            <a href="{{LINK}}" class="button">{{BUTTON_TEXT}}</a>
        </div>
        
 
        <div class="divider-line"></div>
        
     
        <div class="fallback-link">
            <span style="color: #4f6b4f;">Если кнопка не работает:</span><br>
            <a href="{{LINK}}">{{LINK}}</a>
        </div>
        

        <div class="footer-note">
            Ссылка действительна в течение {{EXPIRY_TIME}} минут
        </div>
    </div>
</body>
</html>
